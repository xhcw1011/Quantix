global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "quantix"
    static_configs:
      - targets: ["host.docker.internal:9090"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
